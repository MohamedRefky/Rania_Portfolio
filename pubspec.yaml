name: rania_portfolio
description: "Rania Abdelbary Portfolio"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.1

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  animated_text_kit: ^4.3.0
  font_awesome_flutter: ^11.0.0
  carousel_slider: ^5.1.2
  responsive_framework: ^1.5.1
  url_launcher: ^6.3.2
  lottie: ^3.3.2
  device_preview: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Rania_Image.jpeg"
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/data/
    - assets/images/
    - assets/nano/
    - assets/VILA_PROJECT/
    - assets/shop_drawing/
    


